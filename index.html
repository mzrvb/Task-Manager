<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Learning JavaScript</title>
        <script src="index.js" defer></script>
        <link rel="stylesheet" href="style.css">
    </head>
    
    <body>
        <main class="container">
            <h1>Task Manager</h1>

            <!-- INPUTS ROW ==================================================-->
            <div class="input-interface">

                <!-- add task button -->
                <button class="add-task-button" id="addtaskBtn">Add Task</button>

                <!-- filter dropdown -->
                <div class="dropdown">
                    <button id="dropBtn">Filter Tasks</button>            
                    <ul class="hide-drop-list" id="dropList">
                        <li><button class="drop-item" data-action="edit">Alphabet (A-Z)</button></li>
                        <li><button class="drop-item" data-action="archive">Priority (1-5)</button></li>
                        <li><button class="drop-item" data-action="delete">Duration</button></li>
                    </ul>
                </div>

                <!-- search bar and button -->
                <input type="text" class="search-bar" id="searchBar" placeholder="Search task">
                <button class="search-button" id="searchBtn">Search</button>
            </div>

                    <button type="submit" id="add-taskBtn">Add Task</button>

    </body>
</html>
