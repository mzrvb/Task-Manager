<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task Manager</title>
        <script src="index.js" defer></script>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="utilities.css">
    </head>
    
    <body>
        <main class="container">
            
            <div class="title">
                <h1>Task Manager</h1>
            </div>

            <!-- INPUTS ROW ==================================================-->
            <div class="input-interface">
                <!-- task name -->
                <input type="text" id="task-name" placeholder="Task Name" required> 
                <!-- due date -->
                <input type="date" id="taskDueDate" class="task-due-date">
                <!-- priority dropdown -->
                <div class="priority">
                    <button id="dropBtn">Priority</button>            
                    <ul id="priorityDrop" class="drop-list">
                        <li><button class="drop-button" data-action="5">5</button></li>
                        <li><button class="drop-button" data-action="4">4</button></li>
                        <li><button class="drop-button" data-action="3">3</button></li>
                        <li><button class="drop-button" data-action="2">2</button></li>
                        <li><button class="drop-button" data-action="1">1</button></li>
                    </ul>
                </div>
            </div>
            
        </main>
    </body>
</html>
