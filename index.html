<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task Manager</title>
        <script src="index.js" defer></script>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">  
    </head>
    
    <body>
        <main class="container">   
            <div class="title-bar">
                <h1>Task Manager</h1>
                <h4>Made with JavaScript, HTML, CSS</h4>
            </div>

            <!-- INPUTS ROW ==================================================-->
            <div class="input-interface">
                <!-- task name -->
                <input type="text" id="taskName" class="task-name-input" placeholder="Task Name" required> 
                <!-- due date -->
                <input type="date" id="taskDate" class="task-due-date">
                <!-- priority dropdown -->
                <div class="priority">
                    <button id="priorityBtn" class="drop-button">Priority</button>            
                    <ul id="priorityList" class="drop-list">
                        <li><button class="drop-option" data-action="5">5</button></li>
                        <li><button class="drop-option" data-action="4">4</button></li>
                        <li><button class="drop-option" data-action="3">3</button></li>
                        <li><button class="drop-option" data-action="2">2</button></li>
                        <li><button class="drop-option" data-action="1">1</button></li>
                    </ul>
                </div>
                <!-- add task button -->
                <button id="taskBtn" class="add-task-button">Add Task</button>
            </div> 
            
            <!-- SORT BUTTON ROW ==================================================-->
            <div class="view-interface hidden">
                <div id="sortView" class="viewGroup">
                    <button id="prioritysortBtn" class="sort-priority">Sort by Priority</button>
                    <button id="datesortBtn" class="sort-date">Sort by Due Date</button>
                    <button id="alphabetsortBtn" class="sort-alpha">Sort by Alphabet</button>
                </div>
                <div id="statusView" class="viewGroup">
                    <button id="activeviewBtn" class="sort-active">Active</button>
                    <button id="completedviewBtn" class="sort-completed">Completed</button>
                </div>
            </div>
            
            <!-- TASK DISPLAY ==================================================-->
            <div id="taskDisplay"></div> <!-- dynamically redraw with changes using .innerHtml -->
        </main>
    </body>
</html>
